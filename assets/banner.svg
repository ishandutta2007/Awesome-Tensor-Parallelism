<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.8" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#e879f9" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#bgGrad)" />
  
  <!-- Abstract Geometric Sharding/Tensor Grid -->
  <g stroke="url(#glowGrad)" stroke-width="1.5" fill="none" opacity="0.3">
    <!-- horizontal grid lines sharded -->
    <line x1="50" y1="100" x2="1150" y2="100" />
    <line x1="50" y1="200" x2="1150" y2="200" />
    <line x1="50" y1="300" x2="1150" y2="300" />
    <!-- vertical grid lines representing columns -->
    <line x1="150" y1="50" x2="150" y2="350" />
    <line x1="300" y1="50" x2="300" y2="350" />
    <line x1="450" y1="50" x2="450" y2="350" />
    <line x1="600" y1="50" x2="600" y2="350" />
    <line x1="750" y1="50" x2="750" y2="350" />
    <line x1="900" y1="50" x2="900" y2="350" />
    <line x1="1050" y1="50" x2="1050" y2="350" />
  </g>

  <!-- Glowing Nodes representing partitioned weights/GPUs -->
  <g filter="url(#glow)">
    <circle cx="150" cy="100" r="8" fill="#3b82f6" />
    <circle cx="450" cy="100" r="8" fill="#a855f7" />
    <circle cx="750" cy="100" r="8" fill="#ec4899" />
    <circle cx="1050" cy="100" r="8" fill="#3b82f6" />
    
    <circle cx="300" cy="200" r="8" fill="#ec4899" />
    <circle cx="600" cy="200" r="8" fill="#3b82f6" />
    <circle cx="900" cy="200" r="8" fill="#a855f7" />
    
    <circle cx="150" cy="300" r="8" fill="#a855f7" />
    <circle cx="450" cy="300" r="8" fill="#ec4899" />
    <circle cx="750" cy="300" r="8" fill="#3b82f6" />
    <circle cx="1050" cy="300" r="8" fill="#a855f7" />
  </g>

  <!-- Flow lines connecting sharded layers -->
  <path d="M 150 100 Q 225 150 300 200 T 450 300 T 600 200 T 750 100 T 900 200 T 1050 300" 
        fill="none" stroke="url(#textGrad)" stroke-width="3" filter="url(#glow)" opacity="0.6" />

  <!-- Main Typography -->
  <text x="600" y="170" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="54" font-weight="800" fill="url(#textGrad)" filter="url(#glow)">
    AWESOME TENSOR PARALLELISM
  </text>
  
  <text x="600" y="220" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#94a3b8" letter-spacing="2">
    Scaling Large Language Models Beyond Single GPU Boundaries
  </text>
  
  <!-- Technical tags in banner -->
  <g font-family="'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#64748b" opacity="0.8">
    <text x="150" y="375" text-anchor="middle">1D MEGATRON-LM</text>
    <text x="375" y="375" text-anchor="middle">2D / 2.5D / 3D SPATIAL</text>
    <text x="600" y="375" text-anchor="middle">SEQUENCE PARALLELISM</text>
    <text x="825" y="375" text-anchor="middle">ALL-REDUCE / ALL-GATHER</text>
    <text x="1050" y="375" text-anchor="middle">vLLM &amp; INFRASTRUCTURE</text>
  </g>
</svg>
